name: Build Desktop Installer

on:
  push:
    branches:
      - "**"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "desktop-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-desktop:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "npm ci attempt $attempt/$maxAttempts"
            npm ci --no-audit --no-fund --prefer-offline
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -lt $maxAttempts) {
              Write-Host "npm ci failed with exit code $LASTEXITCODE. Retrying in 15 seconds."
              if (Test-Path node_modules) {
                Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
              }
              Start-Sleep -Seconds 15
            } else {
              exit $LASTEXITCODE
            }
          }

      - name: Build NSIS installer
        working-directory: desktop
        run: npm run dist:win -- --publish=never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: anglicus-desktop-installer
          path: desktop/release/*.exe
          if-no-files-found: error

      - name: Upload installer to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*.exe

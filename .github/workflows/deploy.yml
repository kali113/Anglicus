name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          NODE_ENV: production
          GITHUB_PAGES: "true"
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}

      - name: Resolve build output directory
        run: |
          if [ -f web/build/index.html ]; then
            echo "OUTPUT_DIR=web/build" >> "$GITHUB_ENV"
          elif [ -d web/.svelte-kit/cloudflare ]; then
            echo "OUTPUT_DIR=web/.svelte-kit/cloudflare" >> "$GITHUB_ENV"
          else
            echo "Unable to find a supported build output directory." >&2
            exit 1
          fi

      - name: Create 404.html for SPA routing
        run: |
          if [ -f "$OUTPUT_DIR/index.html" ] && [ ! -f "$OUTPUT_DIR/404.html" ]; then
            cp "$OUTPUT_DIR/index.html" "$OUTPUT_DIR/404.html"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUTPUT_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="darkreader-lock" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        try {
          const STORAGE_KEY = "anglicus_locale";
          const stored = localStorage.getItem(STORAGE_KEY);
          const pathMatch = (location.pathname || "").match(/\/(en|es)(?:\/|$)/);
          const pathLocale = pathMatch?.[1] === "en" || pathMatch?.[1] === "es"
            ? pathMatch[1]
            : null;
          const inferred =
            pathLocale
              ? pathLocale
              : stored === "en" || stored === "es"
                ? stored
              : (navigator.language || "").toLowerCase().startsWith("es")
                ? "es"
                : "en";
          document.documentElement.lang = inferred;
        } catch {
          // Ignore bootstrap locale failures and keep default lang.
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
